name: aashraya
description: "Aashraya - Elderly Care Companion App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^13.2.0
  speech_to_text: ^7.0.0
  flutter_tts: ^4.0.2

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Firebase (Updated to latest compatible versions)
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.1
  firebase_messaging: ^15.1.3
  firebase_storage: ^12.3.2

  # UI & Styling
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  lottie: ^3.1.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  http: ^1.2.1

  # Icons
  iconsax: ^0.0.8
  cupertino_icons: ^1.0.6

  # Local Notifications
  flutter_local_notifications: ^17.1.2

  # Camera & Image
  image_picker: ^1.0.7
  camera: ^0.10.5+9

  # PDF
  pdf: ^3.10.8
  printing: ^5.12.0

  # Storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^10.1.0

  # Utils
  intl: ^0.19.0
  uuid: ^4.3.3
  permission_handler: ^11.3.1
  url_launcher: ^6.2.6
  connectivity_plus: ^6.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/